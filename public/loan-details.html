<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Details - Loan Reminder</title>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --white: #ffffff;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border-color: #374151;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .back-link:hover { text-decoration: underline; }

    .loan-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
    }

    .loan-header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.375rem 0.875rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(255,255,255,0.2);
      margin-top: 0.5rem;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .detail-card {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
    }

    .detail-card h3 {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .detail-card .value.highlight {
      color: var(--primary);
    }

    .section {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
    }

    .section h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .payment-history {
      list-style: none;
    }

    .payment-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .payment-item:last-child { border-bottom: none; }

    .payment-amount {
      font-weight: 700;
      color: var(--success);
    }

    .btn {
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      font-size: 0.9375rem;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard-new.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Dashboard
    </a>

    <div id="loanDetails">
      <!-- Content loaded dynamically -->
      <div class="empty-state">
        <p>🔄 Loading loan details...</p>
      </div>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    // Get loan ID from URL or localStorage
    const loanId = new URLSearchParams(window.location.search).get('id') || 
                   localStorage.getItem('selectedLoanId');

    if (!loanId) {
      window.location.href = 'view-loans.html';
      return;
    }

    async function loadLoanDetails() {
      try {
        const response = await fetch('http://localhost:5000/loans', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (response.ok && data.loans) {
          const loan = data.loans.find(l => l._id === loanId);
          
          if (!loan) {
            document.getElementById('loanDetails').innerHTML = `
              <div class="empty-state">
                <h3>❌ Loan not found</h3>
                <a href="view-loans.html" class="btn btn-primary" style="margin-top: 1rem;">View All Loans</a>
              </div>
            `;
            return;
          }

          renderLoanDetails(loan);
        }
      } catch (error) {
        console.error('Error loading loan:', error);
        document.getElementById('loanDetails').innerHTML = `
          <div class="empty-state">
            <h3>❌ Failed to load loan details</h3>
            <button onclick="loadLoanDetails()" class="btn btn-primary" style="margin-top: 1rem;">Retry</button>
          </div>
        `;
      }
    }

    function renderLoanDetails(loan) {
      const statusClass = {
        'active': 'background: rgba(16, 185, 129, 0.2);',
        'overdue': 'background: rgba(239, 68, 68, 0.2);',
        'paid': 'background: rgba(16, 185, 129, 0.2);'
      }[loan.status];

      const statusEmoji = {
        'active': '🟢',
        'overdue': '🔴',
        'paid': '✅'
      }[loan.status];

      document.getElementById('loanDetails').innerHTML = `
        <div class="loan-header">
          <h1>${loan.loanName}</h1>
          <div style="opacity: 0.9;">${loan.bankName}</div>
          <span class="status-badge" style="${statusClass}">${statusEmoji} ${loan.status.toUpperCase()}</span>
        </div>

        <div class="details-grid">
          <div class="detail-card">
            <h3>Loan Amount</h3>
            <div class="value">KSh ${loan.loanAmount.toLocaleString()}</div>
          </div>
          <div class="detail-card">
            <h3>Remaining Balance</h3>
            <div class="value highlight">KSh ${loan.remainingBalance.toLocaleString()}</div>
          </div>
          <div class="detail-card">
            <h3>Due Date</h3>
            <div class="value">${new Date(loan.dueDate).toLocaleDateString()}</div>
          </div>
          <div class="detail-card">
            <h3>Days Remaining</h3>
            <div class="value ${getDaysRemaining(loan.dueDate) < 7 ? 'highlight' : ''}">${getDaysRemaining(loan.dueDate)} days</div>
          </div>
        </div>

        <div class="section">
          <h2>⚡ Quick Actions</h2>
          <div class="actions">
            <a href="quick-pay.html" class="btn btn-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
              Make Payment
            </a>
            <button onclick="alert('Edit loan feature coming soon!')" class="btn btn-secondary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Edit Loan
            </button>
          </div>
        </div>

        <div class="section">
          <h2>📊 Loan Information</h2>
          <div style="display: grid; gap: 1rem;">
            <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color);">
              <span style="color: var(--text-secondary);">Created Date</span>
              <span style="font-weight: 600;">${new Date(loan.createdAt).toLocaleDateString()}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color);">
              <span style="color: var(--text-secondary);">Interest Rate</span>
              <span style="font-weight: 600;">${loan.interestRate || 0}%</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 0.75rem 0;">
              <span style="color: var(--text-secondary);">Loan ID</span>
              <span style="font-weight: 600; font-size: 0.875rem;">${loan._id}</span>
            </div>
          </div>
        </div>
      `;
    }

    function getDaysRemaining(dueDate) {
      const due = new Date(dueDate);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      due.setHours(0, 0, 0, 0);
      const diff = Math.floor((due - today) / (1000 * 60 * 60 * 24));
      return diff;
    }

    loadLoanDetails();
  </script>
</body>
</html>
