<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Loan - Loan Reminder</title>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --white: #ffffff;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      color: var(--gray-800);
    }

    .form-container {
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .form-header {
      max-width: 800px;
      margin: 0 auto 2rem;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-content h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-primary:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    .form-card {
      max-width: 800px;
      margin: 0 auto;
      background: var(--white);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
    }

    .form-grid {
      display: grid;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--gray-800);
      font-size: 0.9375rem;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .form-group input {
      padding: 1rem 1.25rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 1rem;
      transition: all 0.2s;
      background: var(--white);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgb(16 185 129 / 0.1);
    }

    .form-group small {
      color: var(--gray-600);
      font-size: 0.8125rem;
      margin-top: 0.375rem;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-100);
    }

    .success-message {
      background: #dcfce7;
      color: #166534;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    @media (max-width: 640px) {
      .form-card {
        padding: 1.5rem;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions .btn {
        width: 100%;
        justify-content: center;
      }

      .header-content {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .header-actions {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <header class="form-header">
      <div class="header-content">
        <h1>
          ➕ Add New Loan
        </h1>
        <div class="header-actions">
          <a href="dashboard-new.html" class="btn btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Dashboard
          </a>
          <a href="view-loans.html" class="btn btn-outline">View Loans</a>
        </div>
      </div>
    </header>

    <main>
      <div class="form-card">
        <div class="success-message" id="successMessage">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Loan added successfully!</span>
        </div>

        <div class="error-message" id="errorMessage">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText">Error message</span>
        </div>

        <form id="addLoanForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="loanName">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                Loan Name
              </label>
              <input type="text" id="loanName" name="loanName" placeholder="e.g., Personal Loan, Car Loan, Business Loan" required>
              <small>Give your loan a descriptive name</small>
            </div>

            <div class="form-group">
              <label for="loanAmount">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23"/>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Loan Amount (KSh)
              </label>
              <input type="number" id="loanAmount" name="loanAmount" placeholder="0" min="100" step="0.01" required>
              <small>Minimum loan amount is KSh 100</small>
            </div>

            <div class="form-group">
              <label for="bankName">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 21h18M5 21v-7M19 21v-7M4 10V3M20 10V3M12 10V3M2 14h20M2 10h20"/>
                </svg>
                Bank / Institution Name
              </label>
              <input type="text" id="bankName" name="bankName" placeholder="e.g., KCB, Equity Bank, Co-operative Bank" required>
              <small>Name of the lending bank or institution</small>
            </div>

            <div class="form-group">
              <label for="dueDate">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Due Date
              </label>
              <input type="date" id="dueDate" name="dueDate" required>
              <small>When the next payment is due</small>
            </div>
          </div>

          <div class="form-actions">
            <a href="dashboard-new.html" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              <span id="submitText">Add Loan</span>
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    const form = document.getElementById('addLoanForm');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const submitBtn = form.querySelector('button[type="submit"]');
    const submitText = document.getElementById('submitText');

    // Set default due date to 30 days from now
    const defaultDate = new Date();
    defaultDate.setDate(defaultDate.getDate() + 30);
    document.getElementById('dueDate').value = defaultDate.toISOString().split('T')[0];

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hide previous messages
      successMessage.style.display = 'none';
      errorMessage.style.display = 'none';

      const formData = {
        loanName: document.getElementById('loanName').value.trim(),
        loanAmount: parseFloat(document.getElementById('loanAmount').value),
        bankName: document.getElementById('bankName').value.trim(),
        dueDate: document.getElementById('dueDate').value
      };

      // Validation
      if (formData.loanAmount < 100) {
        showError('Loan amount must be at least KSh 100');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      submitText.textContent = 'Adding...';

      try {
        const response = await fetch('http://localhost:5000/add-loan', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('Loan added successfully!');
          setTimeout(() => {
            window.location.href = 'view-loans.html';
          }, 1500);
        } else {
          showError(data.error || 'Failed to add loan');
        }
      } catch (error) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        submitBtn.disabled = false;
        submitText.textContent = 'Add Loan';
      }
    });

    function showSuccess(message) {
      successMessage.querySelector('span').textContent = message;
      successMessage.style.display = 'flex';
      errorMessage.style.display = 'none';
    }

    function showError(message) {
      errorText.textContent = message;
      errorMessage.style.display = 'flex';
      successMessage.style.display = 'none';
    }

    // Real-time validation
    document.getElementById('loanAmount').addEventListener('input', function() {
      const amount = parseFloat(this.value);
      if (amount < 100) {
        this.setCustomValidity('Minimum loan amount is KSh 100');
      } else {
        this.setCustomValidity('');
      }
    });
  </script>
</body>
</html>
