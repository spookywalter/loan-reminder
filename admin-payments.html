<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Payments - Admin Dashboard</title>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #34d399;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --white: #ffffff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
    }

    [data-theme="dark"] {
      --gray-50: #1a1a2e;
      --gray-100: #16213e;
      --gray-200: #1f2937;
      --gray-300: #374151;
      --gray-600: #9ca3af;
      --gray-700: #d1d5db;
      --gray-800: #e5e7eb;
      --gray-900: #f9fafb;
      --white: #0f172a;
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border-color: #374151;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .page-container {
      min-height: 100vh;
    }

    .page-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 1.5rem 2rem;
      box-shadow: var(--shadow-lg);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-content h1 {
      font-size: 1.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      text-align: center;
      transition: all 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      display: block;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .payments-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .card-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .filter-tabs {
      display: flex;
      gap: 0.5rem;
    }

    .filter-tab {
      padding: 0.5rem 1rem;
      border: 2px solid var(--border-color);
      background: transparent;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .filter-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .payments-table {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--gray-50);
    }

    th {
      padding: 1rem 1.5rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }

    tbody tr {
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: var(--gray-50);
    }

    .payment-status {
      padding: 0.375rem 0.875rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      padding: 0.5rem 0.875rem;
      font-size: 0.8125rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state svg {
      fill: var(--gray-300);
      margin-bottom: 1rem;
    }

    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: center;
      }

      .main-content {
        padding: 1rem;
      }

      table {
        font-size: 0.8125rem;
      }

      th, td {
        padding: 0.75rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <div class="header-content">
        <h1>
          💳 Payment Management
        </h1>
        <div class="header-actions">
          <a href="admin-dashboard.html" class="btn btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Dashboard
          </a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-value" id="totalPayments">0</span>
          <span class="stat-label">Total Payments</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="pendingPayments" style="color: var(--warning);">0</span>
          <span class="stat-label">Pending Approval</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="approvedPayments" style="color: var(--success);">0</span>
          <span class="stat-label">Approved</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="totalAmount">KSh 0</span>
          <span class="stat-label">Total Amount</span>
        </div>
      </div>

      <div class="payments-card">
        <div class="card-header">
          <h2>All Payments</h2>
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="approved">Approved</button>
            <button class="filter-tab" data-filter="rejected">Rejected</button>
          </div>
        </div>
        <div class="payments-table">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>User</th>
                <th>Loan</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="paymentsTableBody">
              <tr>
                <td colspan="7" class="loading-state">
                  <div>🔄 Loading payments...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="app-config.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
    } else {
      // Verify admin access
      try {
        const decoded = JSON.parse(atob(token.split('.')[1]));
        if (!decoded.isAdmin) {
          alert('Admin access required!');
          window.location.href = 'admin-dashboard.html';
        } else {
          // Initialize the page
          loadPayments();
        }
      } catch (e) {
        window.location.href = 'login.html';
      }
    }

    let allPayments = [];
    let currentFilter = 'all';

    async function loadPayments() {
      try {
        const response = await fetch('http://localhost:5000/admin/all-payments', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (response.ok && data.payments) {
          allPayments = data.payments.map(p => ({
            ...p,
            status: p.status || 'pending'
          }));
          renderPayments();
          updateStats();
        }
      } catch (error) {
        console.error('Error loading payments:', error);
        document.getElementById('paymentsTableBody').innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">
              <h3>❌ Failed to load payments</h3>
              <p>Please check your connection and try again</p>
              <button onclick="loadPayments()" class="btn btn-primary" style="margin-top: 1rem;">Retry</button>
            </td>
          </tr>
        `;
      }
    }

    function renderPayments() {
      const tbody = document.getElementById('paymentsTableBody');
      const filtered = currentFilter === 'all' 
        ? allPayments 
        : allPayments.filter(p => p.status === currentFilter);

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6v2l8 5 8-5V6l-8 5z"/>
              </svg>
              <h3>No payments found</h3>
              <p>${currentFilter === 'all' ? 'No payments have been made yet' : `No ${currentFilter} payments`}</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = filtered.map(payment => {
        const date = new Date(payment.paymentDate).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
        const username = payment.userId?.username || 'Unknown';
        const loanName = payment.loanId?.loanName || 'General Payment';
        const method = (payment.paymentMethod || 'mpesa').toUpperCase();
        const status = payment.status || 'pending';
        
        const statusClass = {
          'pending': 'status-pending',
          'approved': 'status-approved',
          'rejected': 'status-rejected'
        }[status];

        const statusText = {
          'pending': '⏳ Pending',
          'approved': '✅ Approved',
          'rejected': '❌ Rejected'
        }[status];

        const actions = status === 'pending' ? `
          <div class="action-buttons">
            <button class="btn btn-success btn-small" onclick="approvePayment('${payment._id}')">
              ✓ Approve
            </button>
            <button class="btn btn-danger btn-small" onclick="rejectPayment('${payment._id}')">
              ✗ Reject
            </button>
          </div>
        ` : '<span style="color: var(--text-secondary);">—</span>';

        return `
          <tr>
            <td>${date}</td>
            <td><strong>${username}</strong></td>
            <td>${loanName}</td>
            <td><strong style="color: var(--primary);">KSh ${payment.amount.toLocaleString()}</strong></td>
            <td>${method}</td>
            <td><span class="payment-status ${statusClass}">${statusText}</span></td>
            <td>${actions}</td>
          </tr>
        `;
      }).join('');
    }

    function updateStats() {
      const total = allPayments.length;
      const pending = allPayments.filter(p => p.status === 'pending').length;
      const approved = allPayments.filter(p => p.status === 'approved').length;
      const totalAmount = allPayments.filter(p => p.status === 'approved').reduce((sum, p) => sum + p.amount, 0);

      document.getElementById('totalPayments').textContent = total;
      document.getElementById('pendingPayments').textContent = pending;
      document.getElementById('approvedPayments').textContent = approved;
      document.getElementById('totalAmount').textContent = 'KSh ' + totalAmount.toLocaleString();
    }

    async function approvePayment(paymentId) {
      if (!confirm('Approve this payment?')) return;

      try {
        const response = await fetch(`http://localhost:5000/admin/payment/${paymentId}/approve`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          alert('✅ Payment approved successfully!');
          loadPayments();
        } else {
          const data = await response.json();
          alert('Failed: ' + (data.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error approving payment:', error);
        alert('Network error. Please try again.');
      }
    }

    async function rejectPayment(paymentId) {
      const reason = prompt('Reason for rejection (optional):');
      if (reason === null) return;

      try {
        const response = await fetch(`http://localhost:5000/admin/payment/${paymentId}/reject`, {
          method: 'PUT',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ reason: reason || 'No reason provided' })
        });

        if (response.ok) {
          alert('❌ Payment rejected');
          loadPayments();
        } else {
          const data = await response.json();
          alert('Failed: ' + (data.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Error rejecting payment:', error);
        alert('Network error. Please try again.');
      }
    }

    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelector('.filter-tab.active').classList.remove('active');
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderPayments();
      });
    });

    // Load payments on page load
    loadPayments();
  </script>
</body>
</html>
