<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Loan Reminder</title>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --white: #ffffff;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #065f46 0%, #047857 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-container {
      background: var(--white);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    .auth-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--gray-800);
    }

    .auth-header p {
      color: var(--gray-600);
      font-size: 0.9375rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.9375rem;
    }

    .form-group input {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgb(16 185 129 / 0.1);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-primary:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }

    .btn-google {
      background: var(--white);
      color: var(--gray-700);
      border: 2px solid var(--gray-200);
    }

    .btn-google:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
    }

    .error-message {
      color: var(--danger);
      background: #fee2e2;
      padding: 0.875rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin: 1rem 0;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .success-message {
      color: #166534;
      background: #dcfce7;
      padding: 0.875rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin: 1rem 0;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .divider {
      position: relative;
      text-align: center;
      margin: 1.5rem 0;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gray-200);
    }

    .divider span {
      background: var(--white);
      padding: 0 1rem;
      color: var(--gray-600);
      font-size: 0.875rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--gray-600);
      font-size: 0.9375rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .password-requirements {
      background: var(--gray-50);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-top: 0.5rem;
      font-size: 0.8125rem;
      color: var(--gray-600);
    }

    .password-requirements ul {
      margin: 0.5rem 0 0 1.25rem;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">💰</div>
      <h2>Create Account</h2>
      <p>Join thousands managing their loans smarter</p>
    </div>

    <div class="success-message" id="successMessage">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span>Account created successfully! Redirecting...</span>
    </div>

    <div class="error-message" id="errorMessage">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Error message</span>
    </div>

    <form id="signupForm">
      <div class="form-group">
        <label for="username">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.25rem;">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Username
        </label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3">
      </div>

      <div class="form-group">
        <label for="email">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.25rem;">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Email Address
        </label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.25rem;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Password
        </label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6">
        <div class="password-requirements">
          <strong>Password must be at least 6 characters</strong>
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.25rem;">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.9.35 1.78.68 2.61a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.47-1.29a2 2 0 0 1 2.11-.45c.83.33 1.71.56 2.61.68A2 2 0 0 1 22 16.92z"/>
          </svg>
          Phone Number for SMS Reminders
        </label>
        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g. 0712345678 or +254712345678">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
          <line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
        <span id="submitText">Create Account</span>
      </button>

      <div class="divider">
        <span>or</span>
      </div>

      <button type="button" class="btn btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hide previous messages
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const phoneNumber = document.getElementById('phoneNumber').value.trim();

      // Validation
      if (username.length < 3) {
        showError('Username must be at least 3 characters');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      submitText.textContent = 'Creating...';

      try {
        const response = await fetch('http://localhost:5000/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, password, phoneNumber })
        });

        const data = await response.json();

        if (response.ok) {
          // Save token
          localStorage.setItem('token', data.token);
          showSuccess('Account created successfully! Redirecting...');
          setTimeout(() => {
            window.location.href = 'dashboard-new.html';
          }, 1500);
        } else {
          showError(data.error || 'Failed to create account');
        }
      } catch (error) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        submitBtn.disabled = false;
        submitText.textContent = 'Create Account';
      }
    });

    function showError(message) {
      errorText.textContent = message;
      errorMessage.style.display = 'flex';
      successMessage.style.display = 'none';
    }

    function showSuccess(message) {
      successMessage.querySelector('span').textContent = message;
      successMessage.style.display = 'flex';
      errorMessage.style.display = 'none';
    }

    document.getElementById('googleBtn').addEventListener('click', () => {
      window.location.href = `${window.API_BASE_URL}/auth/google/start?mode=signup`;
    });
  </script>
</body>
</html>
